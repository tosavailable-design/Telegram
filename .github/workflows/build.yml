name: Build Patched Telegram

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Dummy Files (Bypassing Firebase properly)
        run: |
          # Создаем ПРАВИЛЬНЫЙ фейковый json, чтобы плагин Google заткнулся про api_key
          cat << 'EOF' > TMessagesProj/google-services.json
          {
            "project_info": { "project_number": "123", "project_id": "dummy" },
            "client":[
              {
                "client_info": { "mobilesdk_app_id": "1:123:android:123", "android_client_info": { "package_name": "org.telegram.messenger" } },
                "api_key":[ { "current_key": "dummy_key_12345" } ]
              },
              {
                "client_info": { "mobilesdk_app_id": "1:123:android:124", "android_client_info": { "package_name": "org.telegram.messenger.beta" } },
                "api_key":[ { "current_key": "dummy_key_12345" } ]
              },
              {
                "client_info": { "mobilesdk_app_id": "1:123:android:125", "android_client_info": { "package_name": "org.telegram.messenger.web" } },
                "api_key":[ { "current_key": "dummy_key_12345" } ]
              }
            ],
            "configuration_version": "1"
          }
          EOF
          
          echo "RELEASE_KEY_PASSWORD=dummy" > local.properties
          echo "RELEASE_KEY_ALIAS=dummy" >> local.properties
          echo "RELEASE_STORE_PASSWORD=dummy" >> local.properties

      - name: Apply Voice Changer Patch
        run: |
          # Выжигаем DEFAULT и меняем на MIC для твоего Game Turbo
          sed -i 's/MediaRecorder\.AudioSource\.DEFAULT/MediaRecorder.AudioSource.MIC/g' TMessagesProj/src/main/java/org/telegram/messenger/MediaController.java

      - name: Build APK (Afat Debug)
        run: |
          chmod +x gradlew
          # Возвращаем рабочую сборку FAT-версии
          ./gradlew assembleAfatDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Patched-APK
          path: TMessagesProj/build/outputs/apk/**/debug/*.apk
